<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Montador HLS</title>
  <link rel="stylesheet" href="downloader.css">
</head>
<body>
  <main>
    <header>
      <h1>Montador HLS</h1>
      <p id="subtitle">Preparando stream...</p>
    </header>

    <section class="panel">
      <div class="progress-row">
        <progress id="progress" max="100" value="0"></progress>
        <span id="percent">0%</span>
      </div>
      <div id="status">Carregando manifesto.</div>
      <div id="details"></div>
      <div class="actions">
        <button id="startButton" class="primary">Iniciar</button>
        <button id="cancelButton">Cancelar</button>
      </div>
    </section>

    <section class="log" id="log" aria-live="polite"></section>
  </main>

  <script src="downloader.js"></script>
</body>
</html>
