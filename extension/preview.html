<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview de midia</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1 id="title">Preview</h1>
        <p id="subtitle">Preparando player...</p>
      </div>
      <div class="actions">
        <button id="openButton">Abrir URL</button>
        <button id="copyButton">Copiar URL</button>
        <button id="downloadButton" class="primary">Baixar</button>
      </div>
    </header>

    <section class="player-shell">
      <video id="video" controls playsinline></video>
      <img id="imagePreview" alt="">
      <div id="message" class="message"></div>
    </section>

    <section class="controls" aria-label="Controles do preview">
      <label>
        Qualidade
        <select id="qualitySelect" disabled>
          <option value="auto">Auto</option>
        </select>
      </label>
      <label>
        Tipo
        <input id="kindInput" type="text" readonly>
      </label>
      <label>
        Origem
        <input id="sourceInput" type="text" readonly>
      </label>
    </section>

    <section class="info">
      <div id="details"></div>
      <textarea id="urlField" readonly></textarea>
    </section>
  </main>

  <script src="vendor/hls.min.js"></script>
  <script src="vendor/dash.all.min.js"></script>
  <script src="preview.js"></script>
</body>
</html>
